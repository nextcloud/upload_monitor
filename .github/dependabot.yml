version: 2
updates:
- package-ecosystem: composer
  directories:
    - "/"
    - "/vendor-bin/csfixer"
    - "/vendor-bin/phpunit"
    - "/vendor-bin/psalm"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  commit-message:
    prefix: "build"
    include: "scope"
  versioning-strategy: "increase"
  labels:
  - 3. to review
  - dependencies
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: weekly
    day: saturday
    time: "03:00"
    timezone: Europe/Paris
  commit-message:
    prefix: "build"
    include: "scope"
  versioning-strategy: "increase"
  open-pull-requests-limit: 10
  labels:
  - 3. to review
  - dependencies
